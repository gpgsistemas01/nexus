services:
  app:
    build: .
    container_name: sistema-merma-app
    env_file:
      - .env
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: node
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
