name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: smyb_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d smyb_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Variables no sensibles para armar las URLs efímeras de la BD de CI
      # en tiempo de ejecución, sin dejar cadenas de conexión completas en YAML.
      CI_POSTGRES_USER: postgres
      CI_POSTGRES_HOST: localhost
      CI_POSTGRES_PORT: 5432
      CI_DATABASE_NAME: smyb_ci_do_not_use
      CI_DATABASE_TEST_NAME: smyb_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure database URLs
        run: |
          DATABASE_URL="postgresql://${CI_POSTGRES_USER}@${CI_POSTGRES_HOST}:${CI_POSTGRES_PORT}/${CI_DATABASE_NAME}?schema=public"
          DATABASE_TEST_URL="postgresql://${CI_POSTGRES_USER}@${CI_POSTGRES_HOST}:${CI_POSTGRES_PORT}/${CI_DATABASE_TEST_NAME}?schema=public"
          echo "::add-mask::${DATABASE_URL}"
          echo "::add-mask::${DATABASE_TEST_URL}"
          echo "DATABASE_URL=${DATABASE_URL}" >> "${GITHUB_ENV}"
          echo "DATABASE_TEST_URL=${DATABASE_TEST_URL}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: npm ci

      - name: Verify test database configuration
        run: |
          npm run test:db:verify
          DATABASE_URL="$DATABASE_TEST_URL" node --input-type=module -e "import { getDatabaseUrl } from './src/lib/databaseUrl.js'; if (getDatabaseUrl() !== process.env.DATABASE_TEST_URL) { throw new Error('CI must use DATABASE_TEST_URL for tests.'); }"

      - name: Generate Prisma client
        run: npx prisma generate

      # Para CI usamos test:db (no solo npm test) porque este script valida
      # DATABASE_TEST_URL, aplica migraciones y luego ejecuta Vitest.
      - name: Run database migrations and tests
        run: npm run test:db
